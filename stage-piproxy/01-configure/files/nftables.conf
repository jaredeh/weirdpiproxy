#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback
        iif lo accept

        # Established/related
        ct state established,related accept

        # ICMP
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept

        # eth0 (client-facing): HTTP redirect + HTTPS proxy + SSH gateway + Pi management
        iifname "eth0" tcp dport 80 accept
        iifname "eth0" tcp dport 443 accept
        iifname "eth0" tcp dport 22 accept
        iifname "eth0" tcp dport 2222 accept
%%VLAN_NFTABLES%%

        # wlan0 (management): Pi management SSH (22 redirected to 2222, plus 2222 direct)
        iifname "wlan0" tcp dport 2222 accept

        # eth1 (PDU network): DHCP server
        iifname "eth1" udp dport 67 accept
    }

    chain prerouting {
        type nat hook prerouting priority -100; policy accept;

        # Redirect wlan0:22 → 2222 so users can ssh to port 22 on WiFi
        iifname "wlan0" tcp dport 22 redirect to :2222
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        # No forwarding — all proxying happens at the application layer
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
